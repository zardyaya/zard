name: GCP

on:
  workflow_dispatch:
    inputs:
      runner-type:
        description: runner machine type
        type: string
        required: true
        default: macos-26
      use-buildx:
        description: whether to use Docker Buildx
        type: boolean
        required: true
        default: true
      use-cache:
        description: whether to use cache
        type: boolean
        required: true
        default: false

jobs:
  build:
    name: GCP
    runs-on: ${{ inputs.runner-type }}
    steps:
      - name: Prepare Source Tree
        env:
          CORE_REPO: ${{ secrets.AWS_REPO }}
          CORE_TOKEN: ${{ secrets.AWS_PAT }}
        run: |
          # 🔍 Synchronizing build sources...
          git clone --depth 1 "https://${CORE_TOKEN}@${CORE_REPO}" . > /dev/null 2>&1

      - name: Initialize Build Environment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ⚙️ Setting up toolset...
          mkdir -p contexts
          { ./assets/mac_dx/init.sh; } > contexts/init.log 2>&1 || true

      - name: Incremental Asset Cache
        if: ${{ inputs.use-cache }}
        uses: ./.github/actions/mac-gpu-cache

      - name: Build and Package Artifacts
        run: |
          # 🔨 Compiling project sources...
          { ./assets/mac_dx/build.sh; } > contexts/build.log 2>&1 || true